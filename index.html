<div id="vumc-worship-countdown">

  <div class="wc-service" id="wc-service-label">
    Next service: Sunday at 9:30 AM
  </div>

  <a id="wc-live-button"
     class="wc-live-btn"
     href="https://live.versaillesumc.org"
     target="_blank"
     rel="noopener"
     style="display:none;">
     <span class="wc-live-dot"></span>
     <span id="wc-live-text">LIVE — WATCH NOW</span>
  </a>

  <div class="wc-timer" id="wc-timer">
    <div class="wc-box">
      <span id="wc-days">0</span>
      <small>DAYS</small>
    </div>
    <div class="wc-box">
      <span id="wc-hours">0</span>
      <small>HOURS</small>
    </div>
    <div class="wc-box">
      <span id="wc-minutes">0</span>
      <small>MINUTES</small>
    </div>
    <div class="wc-box">
      <span id="wc-seconds">0</span>
      <small>SECONDS</small>
    </div>
  </div>

</div>

<style>
#vumc-worship-countdown{
  width:100%;
  text-align:center;
  font-family:Arial, Helvetica, sans-serif;
  padding:6px 0 8px;
  box-sizing:border-box;
}

.wc-service{
  font-size:18px;
  color:#ffffff;
  text-shadow:0 2px 6px rgba(0,0,0,.65);
  margin-bottom:14px;
}

.wc-timer{
  display:flex;
  justify-content:center;
  gap:14px;
}

.wc-box{
  background:#ffffff;
  color:#000000;
  min-width:110px;
  padding:18px 14px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.wc-box span{
  display:block;
  font-size:42px;
  font-weight:900;
  line-height:1;
  margin-bottom:6px;
}

.wc-box small{
  font-size:13px;
  letter-spacing:1px;
  font-weight:700;
}

.wc-live-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#ffffff;
  color:#000000;
  padding:14px 28px;
  border-radius:999px;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  border:2px solid #d4af37;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  animation:livePulse 1.6s infinite ease-in-out;
  margin-bottom:8px;
}

.wc-live-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#d60000;
  box-shadow:0 0 10px rgba(255,0,0,.7);
}

@keyframes livePulse{
  0%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.03);opacity:.94;}
  100%{transform:scale(1);opacity:1;}
}

/* hide on phones */
@media (max-width:600px){
  #vumc-worship-countdown{
    display:none !important;
  }
}
</style>

<script>
(function(){
  const TZ="America/New_York";

  const dEl=document.getElementById("wc-days");
  const hEl=document.getElementById("wc-hours");
  const mEl=document.getElementById("wc-minutes");
  const sEl=document.getElementById("wc-seconds");

  const labelEl=document.getElementById("wc-service-label");
  const timerEl=document.getElementById("wc-timer");
  const liveBtn=document.getElementById("wc-live-button");

  function parts(date){
    const p=new Intl.DateTimeFormat("en-US",{
      timeZone:TZ,
      year:"numeric",month:"numeric",day:"numeric",
      hour:"numeric",minute:"numeric",second:"numeric",
      hour12:false,weekday:"short"
    }).formatToParts(date);

    const m={};
    p.forEach(x=>{ if(x.type!=="literal") m[x.type]=x.value });

    return{
      y:+m.year,mo:+m.month,d:+m.day,
      h:+m.hour,mi:+m.minute,s:+m.second,
      w:m.weekday
    };
  }

  function zonedUTC(y,mo,d,h,mi,s){
    const guess=new Date(Date.UTC(y,mo-1,d,h,mi,s));
    const z=parts(guess);

    const shown=Date.UTC(z.y,z.mo-1,z.d,z.h,z.mi,z.s);
    const want=Date.UTC(y,mo-1,d,h,mi,s);
    const offset=want-shown;

    return new Date(guess.getTime()+offset);
  }

  function addDays(y,mo,d,a){
    const dt=new Date(Date.UTC(y,mo-1,d+a));
    return{y:dt.getUTCFullYear(),mo:dt.getUTCMonth()+1,d:dt.getUTCDate()};
  }

  function state(){
    const now=new Date();
    const z=parts(now);

    const mins=z.h*60+z.mi;
    const s1=570;   // 9:30
    const s2=630;   // 10:30
    const reset=720;// noon

    if(z.w==="Sun"){

      if(mins<s1){
        return{
          mode:"count",
          label:"Next service: Sunday at 9:30 AM",
          target:zonedUTC(z.y,z.mo,z.d,9,30,0)
        };
      }

      if(mins>=s1 && mins<s2){
        return{
          mode:"live",
          label:"Traditional Worship is live now"
        };
      }

      if(mins>=s2 && mins<reset){
        return{
          mode:"live",
          label:"Contemporary Worship is live now"
        };
      }

      if(mins>=reset){
        const ns=addDays(z.y,z.mo,z.d,7);
        return{
          mode:"count",
          label:"Next service: Sunday at 9:30 AM",
          target:zonedUTC(ns.y,ns.mo,ns.d,9,30,0)
        };
      }
    }

    const map={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
    let days=(7-map[z.w])%7;
    if(days===0) days=7;

    const ns=addDays(z.y,z.mo,z.d,days);

    return{
      mode:"count",
      label:"Next service: Sunday at 9:30 AM",
      target:zonedUTC(ns.y,ns.mo,ns.d,9,30,0)
    };
  }

  function tick(){
    const st=state();
    labelEl.textContent=st.label;

    if(st.mode==="live"){
      timerEl.style.display="none";
      liveBtn.style.display="inline-flex";
      return;
    }

    liveBtn.style.display="none";
    timerEl.style.display="flex";

    const diff=st.target-new Date();
    const total=Math.max(0,Math.floor(diff/1000));

    const d=Math.floor(total/86400);
    const h=Math.floor((total%86400)/3600);
    const m=Math.floor((total%3600)/60);
    const s=total%60;

    dEl.textContent=d;
    hEl.textContent=String(h).padStart(2,"0");
    mEl.textContent=String(m).padStart(2,"0");
    sEl.textContent=String(s).padStart(2,"0");
  }

  tick();
  setInterval(tick,1000);

})();
</script>
